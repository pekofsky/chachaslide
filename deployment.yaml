# ================================
# 1. CONFIGMAP (Externalised config)
# Moves the configuration out of the code, making app portable across environments
# REDIS is memory database used to store data quickly, redis is used in the app.py to count how many visits the app has gotten, redis makes this consistent across containers
# ================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: chachaslide-config
  namespace: chachaslide
data:
  REDIS_HOST: "redis-service"
  APP_MESSAGE: "Welcome to the Cha Cha Slide Kubernetes App 🚀"

---
# ================================
# 2. DEPLOYMENT
# Rolling Update: Gradually replaces pods
# Liveness and Readiness Probes: Monitors app healthand automatically restarts failed contianers
# ================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chachaslide-deployment
  namespace: chachaslide
  labels:
    app: chachaslide
spec:
  replicas: 3   # Base replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1   # Only 1 pod down at a time
      maxSurge: 1         # Only 1 extra pod during updates

  selector:
    matchLabels:
      app: chachaslide

  template:
    metadata:
      labels:
        app: chachaslide

    spec:
      # ADVANCED: Spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: chachaslide
                topologyKey: "kubernetes.io/hostname"

      containers:
        - name: chachaslide
          image: kubetrain.azurecr.io/chachaslide:3.0.1

          ports:
            - containerPort: 8000

          # ✅ Use ConfigMap
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: chachaslide-config
                  key: REDIS_HOST
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: chachaslide-config
                  key: APP_MESSAGE

          # Liveness probe (is app alive?)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          # Readiness probe (is app ready for traffic?)
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ================================
# 3. SERVICE (Public access)
# ================================
apiVersion: v1
kind: Service
metadata:
  name: chachaslide-service
  namespace: chachaslide
spec:
  type: LoadBalancer   # Required for AKS public access
  selector:
    app: chachaslide
  ports:
    - port: 80
      targetPort: 8000

---
# ================================
# 4. HORIZONTAL POD AUTOSCALER
# Scales based on CPU automatically
# ================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chachaslide-hpa
  namespace: chachaslide
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chachaslide-deployment

  minReplicas: 3
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50  # scale when CPU hits 50%

---
# ================================
# 5. OPTIONAL: CLUSTER-INTERNAL SERVICE (for testing)
# ================================
apiVersion: v1
kind: Service
metadata:
  name: chachaslide-clusterip
  namespace: chachaslide
spec:
  type: ClusterIP
  selector:
    app: chachaslide
  ports:
    - port: 80
      targetPort: 8000