
# ================================
# REDIS DEPLOYMENT
# Redis is an in-memory database used to store shared data across pods
# In this project, Redis stores a visit counter so all replicas share state
# ================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: chachaslide
  labels:
    app: redis

spec:
  replicas: 1   # Only 1 needed for this demo

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7

          ports:
            - containerPort: 6379

          # ✅ Resource limits (good practice, even for Redis)
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
# ================================
# REDIS SERVICE (Internal communication)
# Allows Flask app to communicate with Redis using "redis-service"
# Kubernetes DNS automatically resolves this name
# ================================
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: chachaslide

spec:
  type: ClusterIP   # Internal only (NOT exposed publicly)
  selector:
    app: redis

  ports:
    - port: 6379
      targetPort: 6379
